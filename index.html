function getShortMatchName(url, idx) {
  try {
    let parts = url.split("/");
    let slug = parts[parts.length - 2];
    let cleanSlug = slug.replace(/\d+(st|nd|rd|th)-match-\d+/, "");
    let sides = cleanSlug.split("-vs-");
    let t1 = sides[0].replace(/-/g, " ").trim();
    let t2 = sides[1].replace(/-/g, " ").trim();
    const map = {
      "royal challengers bengaluru": "RCB",
      "sunrisers hyderabad": "SRH",
      "mumbai indians": "MI",
      "kolkata knight riders": "KKR",
      "rajasthan royals": "RR",
      "chennai super kings": "CSK",
      "punjab kings": "PBKS",
      "gujarat titans": "GT",
      "lucknow super giants": "LSG",
      "delhi capitals": "DC"
    };
    return "Match " + (idx + 1) + " - " + (map[t1] || t1.toUpperCase()) + " vs " + (map[t2] || t2.toUpperCase());
  } catch(e) {
    return "Match " + (idx + 1);
  }
}

let matchData = [];
let activeTab = "leader";

function clean(n) { return n.replace(/\(c\)|\(wk\)|\+|†/g, "").trim(); }
function normalize(n) { return n.toLowerCase().replace(/[^a-z ]/g, ""); }
function isSamePlayer(a, b) {
  a = normalize(a); b = normalize(b);
  if (a === b) return true;
  let aWords = a.split(" ");
  let bWords = b.split(" ");
  let aLast = aWords[aWords.length - 1];
  let bLast = bWords[bWords.length - 1];
  // Last names must match and be longer than 4 chars
  if (aLast !== bLast || aLast.length <= 4) return false;
  // Special case: common surnames like singh, kumar, sharma need full name match
  const commonSurnames = ["singh", "kumar", "sharma", "patel", "khan", "yadav", "reddy", "iyer"];
  if (commonSurnames.includes(aLast)) return a === b;
  // For unique surnames, last name match is sufficient
  return true;
}

async function fetchMatch(url) {
  let html = null;
  try {
    let res = await fetch("https://gage-pike-let-disclaimers.trycloudflare.com/fetch?url=" + encodeURIComponent(url));
    if (res.ok) html = await res.text();
  } catch(e) {
    console.error("Proxy error:", e);
  }

  if (!html) return {};

  let doc = new DOMParser().parseFromString(html, "text/html");
  let data = {};
  let allPlayers = Object.values(teams).flat();

  doc.querySelectorAll("table tbody tr").forEach(r => {
    let c = r.querySelectorAll("td");
    if (c.length < 3) return;

    let name = clean(c[0].innerText || c[0].textContent);
    let desc = (c[1] ? (c[1].innerText || c[1].textContent) : "").toLowerCase();
    let runs = parseInt(c[2] ? (c[2].innerText || c[2].textContent) : "");

    if (!isNaN(runs)) {
      if (!data[name]) data[name] = {bat:0, bowl:0, catch:0, runout:0};
      data[name].bat += runs;
    }

    let catchM = desc.match(/c\s+(.*?)\s+b/);
    if (catchM) {
      allPlayers.forEach(p => {
        if (isSamePlayer(catchM[1], p)) {
          if (!data[p]) data[p] = {bat:0, bowl:0, catch:0, runout:0};
          data[p].catch += 5;
        }
      });
    }

    let runM = desc.match(/run out\s*\((.*?)\)/);
    if (runM) {
      runM[1].split("/").forEach(f => {
        allPlayers.forEach(p => {
          if (isSamePlayer(f.trim(), p)) {
            if (!data[p]) data[p] = {bat:0, bowl:0, catch:0, runout:0};
            data[p].runout += 5;
          }
        });
      });
    }
  });

  doc.querySelectorAll("table").forEach(t => {
    let txt = (t.innerText || t.textContent).toLowerCase();
    if (txt.includes("bowling")) {
      t.querySelectorAll("tbody tr").forEach(r => {
        let c = r.querySelectorAll("td");
        if (c.length < 5) return;
        let name = clean(c[0].innerText || c[0].textContent);
        let w = parseInt(c[4].innerText || c[4].textContent);
        if (!isNaN(w)) {
          if (!data[name]) data[name] = {bat:0, bowl:0, catch:0, runout:0};
          data[name].bowl += w * 20;
        }
      });
    }
  });

  return data;
}

function getTotal(player) {
  let total = 0;
  matchData.forEach(m => {
    if (m.data[player]) {
      let d = m.data[player];
      total += d.bat + d.bowl + d.catch + d.runout + (d.bat >= 100 ? 50 : 0);
    }
  });
  return total;
}

function getPlayerStats(player) {
  let bat = 0, bowl = 0, catch_ = 0, runout = 0;
  matchData.forEach(m => {
    if (m.data[player]) {
      let d = m.data[player];
      bat += d.bat;
      bowl += d.bowl;
      catch_ += d.catch;
      runout += d.runout;
      if (d.bat >= 100) bat += 50; // century bonus included in bat display
    }
  });
  return { bat, bowl, catch: catch_, runout };
}

async function load() {
  matchData = [];
  document.getElementById("content").innerHTML = "";
  document.getElementById("status").innerHTML = "⏳ Loading match 1 of " + matches.length + "...";

  for (let i = 0; i < matches.length; i++) {
    document.getElementById("status").innerHTML = "⏳ Loading match " + (i+1) + " of " + matches.length + "...";
    let d = await fetchMatch(matches[i].url);
    matchData.push({url: matches[i].url, data: d});
  }

  document.getElementById("status").innerHTML = "✅ All matches loaded!";
  render();
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById("tab-leader").className = "tab" + (tab === "leader" ? " active" : "");
  document.getElementById("tab-matches").className = "tab" + (tab === "matches" ? " active" : "");
  document.getElementById("tab-players").className = "tab" + (tab === "players" ? " active" : "");
  render();
}

function toggle(id) {
  let el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function renderLeader() {
  let arr = [];
  for (let t in teams) {
    let total = 0;
    teams[t].forEach(p => total += getTotal(p));
    arr.push({team: t, total});
  }
  arr.sort((a, b) => b.total - a.total);

  let html = "";
  arr.forEach((t, i) => {
    html += '<div class="card">';
    html += '<div onclick="toggle(\'team' + i + '\')" style="cursor:pointer;font-weight:bold;">';
    html += "#" + (i+1) + " " + t.team + " — " + t.total + " pts ⬇️";
    html += "</div>";
    html += '<div id="team' + i + '" style="display:none;margin-top:10px;">';

    let players = [];
    teams[t.team].forEach(p => players.push({name: p, total: getTotal(p)}));
    players.sort((a, b) => b.total - a.total);

    players.forEach(p => {
      html += '<div style="display:flex;justify-content:space-between;padding:4px 0;">';
      html += "<span>" + p.name + "</span><span>" + p.total + "</span>";
      html += "</div>";
    });

    html += "</div></div>";
  });

  document.getElementById("content").innerHTML = html;
}

function renderMatches() {
  let html = "";
  matchData.forEach((m, i) => {
    html += '<div class="card">';
    html += '<div onclick="toggle(\'m' + i + '\')" style="cursor:pointer;font-weight:bold;">';
    html += getShortMatchName(m.url, i) + " ⬇️";
    html += "</div>";
    html += '<div id="m' + i + '" style="display:none;">';
    html += "<table><tr><th>Player</th><th>Bat</th><th>Bowl</th><th>Catch</th><th>Runout</th><th>Total</th></tr>";

    let players = [];
    Object.values(teams).flat().forEach(p => {
      let d = m.data[p];
      if (!d) return;
      let total = d.bat + d.bowl + d.catch + d.runout + (d.bat >= 100 ? 50 : 0);
      players.push({name: p, bat: d.bat, bowl: d.bowl, catch: d.catch, runout: d.runout, total});
    });
    players.sort((a, b) => b.total - a.total);

    players.forEach(p => {
      html += "<tr><td>" + p.name + "</td><td>" + p.bat + "</td><td>" + p.bowl + "</td><td>" + p.catch + "</td><td>" + p.runout + "</td><td><b>" + p.total + "</b></td></tr>";
    });

    html += "</table></div></div>";
  });

  document.getElementById("content").innerHTML = html;
}

function renderPlayers() {
  // Build a flat list of all players with their team and stats
  let allPlayers = [];
  for (let team in teams) {
    teams[team].forEach(p => {
      let stats = getPlayerStats(p);
      let total = getTotal(p);
      allPlayers.push({ name: p, team, total, ...stats });
    });
  }
  allPlayers.sort((a, b) => b.total - a.total);

  let html = "<div class='card'>";
  html += "<table>";
  html += "<tr><th>#</th><th>Player</th><th>Team</th><th>Bat</th><th>Bowl</th><th>Ctch</th><th>RO</th><th>Total</th></tr>";

  allPlayers.forEach((p, i) => {
    html += "<tr>";
    html += "<td>" + (i+1) + "</td>";
    html += "<td>" + p.name + "</td>";
    html += "<td>" + p.team + "</td>";
    html += "<td>" + p.bat + "</td>";
    html += "<td>" + p.bowl + "</td>";
    html += "<td>" + p.catch + "</td>";
    html += "<td>" + p.runout + "</td>";
    html += "<td><b>" + p.total + "</b></td>";
    html += "</tr>";
  });

  html += "</table></div>";
  document.getElementById("content").innerHTML = html;
}

function render() {
  if (matchData.length === 0) {
    document.getElementById("content").innerHTML = '<div style="text-align:center;color:#94a3b8;margin-top:30px;">Press 🔄 Update to load scores</div>';
    return;
  }
  if (activeTab === "leader") renderLeader();
  else if (activeTab === "matches") renderMatches();
  else renderPlayers();
}

render();
</script>
</body>
</html>
